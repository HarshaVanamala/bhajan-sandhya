<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gate Portal — Bhajan Sandhya</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsqr/1.4.0/jsQR.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --saffron: #E8650A; --deep-red: #7A1C10;
      --gold: #C9922A; --gold-light: #F0C060;
      --cream: #FAF3E8; --dark: #0E0604;
    }
    body { background: var(--dark); color: var(--cream); font-family: 'Inter', sans-serif; min-height: 100vh; padding: 1.5rem; }
    header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid rgba(201,146,42,0.15); }
    .header-left { display: flex; align-items: center; gap: 0.6rem; }
    .logo-img { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; border: 1px solid rgba(201,146,42,0.3); }
    .header-title { font-family: 'Playfair Display', serif; font-size: 1rem; color: var(--gold-light); }
    .header-sub { font-size: 0.65rem; color: rgba(250,243,232,0.35); }
    .logout { font-size: 0.7rem; color: rgba(250,243,232,0.3); text-decoration: none; letter-spacing: 0.06em; }
    .logout:hover { color: var(--gold); }
    .vol-name-wrap { background: rgba(255,255,255,0.03); border: 1px solid rgba(201,146,42,0.15); border-radius: 12px; padding: 1rem; margin-bottom: 1.5rem; }
    .vol-label { font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.4rem; }
    .vol-input { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(201,146,42,0.2); border-radius: 8px; padding: 0.6rem 0.9rem; color: var(--cream); font-size: 0.85rem; font-family: 'Inter', sans-serif; outline: none; }
    .vol-input:focus { border-color: var(--gold); }
    .scanner-section { margin-bottom: 1.5rem; }
    .section-label { font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.75rem; }
    .camera-wrap { position: relative; width: 100%; aspect-ratio: 1; max-width: 320px; margin: 0 auto 1rem; border-radius: 16px; overflow: hidden; border: 1px solid rgba(201,146,42,0.2); background: #000; }
    #cameraFeed { width: 100%; height: 100%; object-fit: cover; display: block; }
    .scan-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
    .scan-frame { width: 55%; aspect-ratio: 1; border: 2px solid rgba(201,146,42,0.7); border-radius: 8px; box-shadow: 0 0 0 9999px rgba(0,0,0,0.45); }
    .scan-line { position: absolute; width: 55%; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); animation: scanMove 2s ease-in-out infinite; }
    @keyframes scanMove { 0%, 100% { top: 22%; } 50% { top: 78%; } }
    .scan-status { text-align: center; font-size: 0.75rem; color: var(--gold); margin-bottom: 0.75rem; min-height: 1.2rem; }
    .btn-scan { width: 100%; background: rgba(232,101,10,0.1); border: 1px solid rgba(201,146,42,0.3); border-radius: 10px; padding: 0.85rem; color: var(--gold-light); font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: all 0.2s; margin-bottom: 0.5rem; }
    .btn-scan:hover { background: rgba(201,146,42,0.15); }
    .btn-scan.active { background: linear-gradient(135deg, var(--saffron), var(--deep-red)); border-color: transparent; color: #fff; }
    .divider { display: flex; align-items: center; gap: 0.75rem; margin: 1rem 0; color: rgba(250,243,232,0.2); font-size: 0.7rem; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(201,146,42,0.12); }
    .manual-wrap { display: flex; gap: 0.5rem; }
    .manual-input { flex: 1; background: rgba(255,255,255,0.04); border: 1px solid rgba(201,146,42,0.25); border-radius: 10px; padding: 0.8rem 1rem; color: var(--cream); font-size: 1rem; font-family: monospace; letter-spacing: 0.15em; text-transform: uppercase; outline: none; }
    .manual-input:focus { border-color: var(--gold); }
    .btn-check { background: linear-gradient(135deg, var(--saffron), var(--deep-red)); border: none; border-radius: 10px; padding: 0.8rem 1.2rem; color: #fff; font-size: 0.82rem; font-weight: 500; cursor: pointer; white-space: nowrap; }
    .result-card { display: none; border-radius: 14px; padding: 1.2rem; margin-top: 1.2rem; text-align: center; animation: fadeUp 0.3s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .result-card.valid { background: rgba(45,122,58,0.2); border: 1px solid rgba(45,122,58,0.5); }
    .result-card.invalid { background: rgba(122,28,16,0.2); border: 1px solid rgba(232,101,10,0.4); }
    .result-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .result-name { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--gold-light); margin-bottom: 0.25rem; }
    .result-detail { font-size: 0.78rem; color: rgba(250,243,232,0.5); margin-bottom: 0.5rem; }
    .result-msg { font-size: 0.85rem; }
    .result-card.valid .result-msg { color: #7dde8b; }
    .result-card.invalid .result-msg { color: #ffb088; }
    .counter-strip { display: flex; gap: 0.75rem; margin-top: 2rem; }
    .counter-card { flex: 1; background: rgba(255,255,255,0.03); border: 1px solid rgba(201,146,42,0.12); border-radius: 12px; padding: 0.9rem; text-align: center; }
    .counter-num { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--gold-light); line-height: 1; margin-bottom: 0.3rem; }
    .counter-label { font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(250,243,232,0.35); }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <img src="/static/images/logo.jpeg" class="logo-img" alt="Logo"/>
    <div>
      <div class="header-title">Gate Portal</div>
      <div class="header-sub">Bhajan Sandhya · July 4, 2026</div>
    </div>
  </div>
  <a href="/logout" class="logout">Log out</a>
</header>

<div class="vol-name-wrap">
  <p class="vol-label">Your Name (for records)</p>
  <input type="text" id="volName" class="vol-input" placeholder="Enter your name"/>
</div>

<div class="scanner-section">
  <p class="section-label">Scan Visitor QR</p>
  <div class="camera-wrap" id="cameraWrap" style="display:none;">
    <video id="cameraFeed" autoplay muted playsinline></video>
    <canvas id="scanCanvas" style="display:none;"></canvas>
    <div class="scan-overlay">
      <div class="scan-frame"></div>
      <div class="scan-line"></div>
    </div>
  </div>
  <p class="scan-status" id="scanStatus"></p>
  <button class="btn-scan" id="scanBtn" onclick="toggleCamera()">📷 Start Camera Scanner</button>
</div>

<div class="divider">or enter code manually</div>

<div class="manual-wrap">
  <input type="text" id="manualCode" class="manual-input" placeholder="A8K2X9QP" maxlength="8"/>
  <button class="btn-check" onclick="checkIn(document.getElementById('manualCode').value)">Check In</button>
</div>

<div class="result-card" id="resultCard">
  <div class="result-icon" id="resultIcon"></div>
  <div class="result-name" id="resultName"></div>
  <div class="result-detail" id="resultDetail"></div>
  <div class="result-msg" id="resultMsg"></div>
</div>

<div class="counter-strip">
  <div class="counter-card">
    <div class="counter-num" id="countIn">0</div>
    <div class="counter-label">Checked In</div>
  </div>
  <div class="counter-card">
    <div class="counter-num" id="countSession">0</div>
    <div class="counter-label">This Session</div>
  </div>
</div>

<script>
  let scanning = false;
  let stream = null;
  let sessionCount = 0;
  let animFrame = null;
  let detected = false;

  async function toggleCamera() {
    if (!scanning) {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
        });
        const video = document.getElementById('cameraFeed');
        video.srcObject = stream;
        await video.play();
        document.getElementById('cameraWrap').style.display = 'block';
        document.getElementById('scanBtn').textContent = '⏹ Stop Camera';
        document.getElementById('scanBtn').classList.add('active');
        document.getElementById('scanStatus').textContent = '🔍 Scanning...';
        scanning = true;
        detected = false;
        requestAnimationFrame(scanFrame);
      } catch(e) {
        alert('Camera error: ' + e.message + '. Use manual entry instead.');
      }
    } else {
      stopCamera();
    }
  }

  function stopCamera() {
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
    document.getElementById('cameraWrap').style.display = 'none';
    document.getElementById('scanBtn').textContent = '📷 Start Camera Scanner';
    document.getElementById('scanBtn').classList.remove('active');
    document.getElementById('scanStatus').textContent = '';
    scanning = false;
  }

  let lastScanTime = 0;
  function scanFrame(timestamp) {
    if (!scanning || detected) return;
    animFrame = requestAnimationFrame(scanFrame);

    if (timestamp - lastScanTime < 150) return;
    lastScanTime = timestamp;

    const video = document.getElementById('cameraFeed');
    if (video.readyState !== video.HAVE_ENOUGH_DATA || video.videoWidth === 0) return;

    const canvas = document.getElementById('scanCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const size = Math.min(video.videoWidth, video.videoHeight);
    canvas.width = size;
    canvas.height = size;
    const ox = (video.videoWidth - size) / 2;
    const oy = (video.videoHeight - size) / 2;
    ctx.drawImage(video, ox, oy, size, size, 0, 0, size, size);

    const imageData = ctx.getImageData(0, 0, size, size);
    const result = jsQR(imageData.data, size, size, { inversionAttempts: 'dontInvert' });

    if (result && result.data) {
      const parts = result.data.split('|');
      let code = null;
      if (parts[0] === 'BHAJAN-SANDHYA' && parts[1]) {
        code = parts[1];
      } else if (result.data.length === 8 && /^[A-Z0-9]+$/i.test(result.data)) {
        code = result.data.toUpperCase();
      }
      if (code) {
        detected = true;
        document.getElementById('scanStatus').textContent = '✅ QR detected!';
        stopCamera();
        checkIn(code);
      }
    }
  }

  async function checkIn(code) {
    code = code.trim().toUpperCase();
    if (code.length !== 8) {
      showResult(false, '', '', 'Pass code must be 8 characters.', false);
      return;
    }
    const volName = document.getElementById('volName').value.trim() || 'Volunteer';
    try {
      const res = await fetch('/api/checkin', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ code, volunteer: volName }),
      });
      const data = await res.json();
      if (data.success) {
        sessionCount++;
        document.getElementById('countSession').textContent = sessionCount;
        showResult(true, data.name, `Pass ${data.pass_index} of ${data.total_passes} · ${code}`, data.message, false);
        refreshCount();
      } else if (data.already_used) {
        showResult(false, data.name, code, data.message, true);
      } else {
        showResult(false, '', code, data.message, false);
      }
    } catch(e) {
      showResult(false, '', code, 'Network error. Try again.', false);
    }
    document.getElementById('manualCode').value = '';
    // Allow scanning again after 3 seconds
    setTimeout(() => { detected = false; }, 3000);
  }

  function showResult(valid, name, detail, msg, alreadyUsed) {
    const card = document.getElementById('resultCard');
    card.className = 'result-card ' + (valid ? 'valid' : 'invalid');
    document.getElementById('resultIcon').textContent = valid ? '✅' : (alreadyUsed ? '⚠️' : '❌');
    document.getElementById('resultName').textContent = name;
    document.getElementById('resultDetail').textContent = detail;
    document.getElementById('resultMsg').textContent = msg;
    card.style.display = 'block';
  }

  async function refreshCount() {
    try {
      const res = await fetch('/api/admin/stats');
      if (res.ok) {
        const data = await res.json();
        document.getElementById('countIn').textContent = data.used || 0;
      }
    } catch {}
  }

  refreshCount();
  setInterval(refreshCount, 15000);
  document.getElementById('manualCode').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkIn(e.target.value);
  });
</script>
</body>
</html>
